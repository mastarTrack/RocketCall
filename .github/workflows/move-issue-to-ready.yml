name: Move referenced issues to Ready

on:
  push:

permissions:
  contents: read

jobs:
  move-referenced-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Move referenced issues to Ready
        uses: actions/github-script@v7
        env:
          PROJECT_OWNER: mastarTrack
          PROJECT_NUMBER: "7"
          TARGET_STATUS: Ready
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectOwner = process.env.PROJECT_OWNER;
            const projectNumber = Number(process.env.PROJECT_NUMBER);
            const targetStatus = process.env.TARGET_STATUS || "Ready";

            const issueNumbers = new Set();
            const commits = context.payload.commits || [];
            const regex = /(?:^|\s)refs?\s+#(\d+)\b/gi;

            // push 된 모든 커밋 메시지에서 ref #12 / refs #12 추출
            for (const commit of commits) {
              const message = commit.message || "";
              for (const match of message.matchAll(regex)) {
                issueNumbers.add(Number(match[1]));
              }
            }

            if (issueNumbers.size === 0) {
              core.info("No ref/refs issue references found in commit messages.");
              return;
            }

            // org project / user project 둘 다 대응
            const projectData = await github.graphql(
              `
              query($projectOwner: String!, $projectNumber: Int!) {
                organization(login: $projectOwner) {
                  projectV2(number: $projectNumber) {
                    id
                    number
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
                user(login: $projectOwner) {
                  projectV2(number: $projectNumber) {
                    id
                    number
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
              `,
              { projectOwner, projectNumber }
            );

            const project =
              projectData.organization?.projectV2 ??
              projectData.user?.projectV2;

            if (!project) {
              core.setFailed(`Project not found: ${projectOwner} / #${projectNumber}`);
              return;
            }

            const statusField = project.fields.nodes.find(
              (field) => field && field.name === "Status"
            );

            if (!statusField) {
              core.setFailed('Status field not found in project.');
              return;
            }

            const readyOption = statusField.options.find(
              (opt) => opt.name === targetStatus
            );

            if (!readyOption) {
              core.setFailed(`Status option "${targetStatus}" not found.`);
              return;
            }

            for (const issueNumber of issueNumbers) {
              core.info(`Processing issue #${issueNumber}`);

              // 이슈 + 해당 이슈가 이미 프로젝트에 들어있는지 확인
              const issueData = await github.graphql(
                `
                query(
                  $owner: String!,
                  $repo: String!,
                  $issueNumber: Int!,
                  $projectNumber: Int!
                ) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $issueNumber) {
                      id
                      projectItems(first: 50) {
                        nodes {
                          id
                          project {
                            ... on ProjectV2 {
                              id
                              number
                            }
                          }
                        }
                      }
                    }
                  }
                }
                `,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issueNumber,
                  projectNumber
                }
              );

              const issue = issueData.repository?.issue;

              if (!issue) {
                core.warning(
                  `Issue #${issueNumber} not found in ${context.repo.owner}/${context.repo.repo}`
                );
                continue;
              }

              // 이미 프로젝트에 들어있는 item 찾기
              let itemId = issue.projectItems.nodes.find(
                (node) => node.project?.number === projectNumber
              )?.id;

              // 없으면 프로젝트에 추가
              if (!itemId) {
                const addResult = await github.graphql(
                  `
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                      item {
                        id
                      }
                    }
                  }
                  `,
                  {
                    projectId: project.id,
                    contentId: issue.id
                  }
                );

                itemId = addResult.addProjectV2ItemById.item.id;
              }

              // Status -> Ready 변경
              await github.graphql(
                `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(
                    input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }
                  ) {
                    projectV2Item {
                      id
                    }
                  }
                }
                `,
                {
                  projectId: project.id,
                  itemId,
                  fieldId: statusField.id,
                  optionId: readyOption.id
                }
              );

              core.info(`Issue #${issueNumber} moved to ${targetStatus}`);
            }
